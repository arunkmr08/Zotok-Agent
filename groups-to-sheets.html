<!doctype html>
<html lang="en" data-loading>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Groups to Sheets — Zotok</title>
<link rel="stylesheet" href="styles/main.css">
<style>
  [data-loading] * { transition: none !important; }
  .groups-layout {
    display: flex;
    height: 100%;
    min-height: 0;
    flex: 1;
  }
  /* ── Column 1 ── */
  .groups-list-pane {
    width: 280px;
    flex: none;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .groups-list-head {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .groups-list-head h1 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  .groups-list-head p  { font-size: 12px; color: var(--muted); }
  .groups-list-scroll  { flex: 1; overflow-y: auto; }

  .group-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    transition: background .12s;
  }
  .group-item:hover { background: var(--white); }
  .group-item.active {
    background: var(--white);
    border-left: 3px solid var(--ink);
    padding-left: 13px;
  }
  .group-item-info { min-width: 0; flex: 1; }
  .group-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .group-item-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .group-item-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    flex: none;
  }
  .group-item.active .group-item-count {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }

  /* ── Column 2 ── */
  .groups-table-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }
  .groups-table-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .groups-table-scroll {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  .groups-table-scroll .table-wrap {
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-top: none;
    box-shadow: none;
    overflow: visible;
  }
  .groups-table-scroll .table { width: max-content; min-width: 100%; }
  .groups-table-scroll .table th,
  .groups-table-scroll .table td { white-space: nowrap; }
  .groups-table-scroll .table th:first-child,
  .groups-table-scroll .table td:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--white);
  }
  .groups-table-scroll .table th:first-child { background: var(--surface); z-index: 3; }
  .groups-table-scroll .table tbody tr:hover td:first-child { background: var(--surface-2); }

  /* Category badge */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-2);
  }
  .badge-order    { background: #edf7f0; border-color: #b7dfc4; color: #2f7d4a; }
  .badge-inquiry  { background: #f0f4ff; border-color: #c0d0f5; color: #3a5ccc; }
  .badge-complaint{ background: #fff4f0; border-color: #f5c8b8; color: #c04020; }
  .badge-payment  { background: #f5f0ff; border-color: #d0bff5; color: #6b3fa0; }
  .badge-delivery { background: #fffbf0; border-color: #f5e0a0; color: #9a7b1c; }

  .action-btn-add {
    font-size: 12px;
    padding: 3px 10px;
    height: 26px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-2);
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .action-btn-add:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .action-btn-add.added { background: var(--surface-2); color: var(--muted); border-color: var(--border); cursor: default; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 48px;
  }
  .empty-state svg { opacity: 0.35; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .pagination-bar {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }
  .pagination-info { font-size: 13px; color: var(--muted); }
  .pagination-controls { display: flex; align-items: center; gap: 4px; }
  .page-num {
    min-width: 32px;
    height: 32px;
    border-radius: var(--r-sm);
    border: 1px solid transparent;
    background: none;
    font-size: 13px;
    color: var(--ink-2);
    cursor: pointer;
    padding: 0 6px;
  }
  .page-num:hover { background: var(--surface); border-color: var(--border); }
  .page-num.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 9px; color: var(--muted); pointer-events: none; }
  .search-input { padding-left: 30px; width: 200px; height: 32px; font-size: 13px; }

  @keyframes shimmer {
    from { background-position: -600px 0; }
    to   { background-position:  600px 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--border) 25%, var(--surface-2) 50%, var(--border) 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: var(--r-sm);
  }
  .shimmer-group-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .shimmer-group-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .shimmer-row {
    display: flex;
    gap: 24px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  /* Export badge strip */
  .export-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--muted);
  }
  .export-strip strong { color: var(--ink-2); }
</style>

  // ── State ──────────────────────────────────────────────────────────────────
  let activeGroupId  = groups[0].id;
  let currentPage    = 1;
  const PAGE_SIZE    = 10;
  let addedRows      = new Set(); // track globally added IDs: `${groupId}-${msgId}`

  // ── Render group list ──────────────────────────────────────────────────────
  const listEl = document.getElementById('groups-list');
  document.getElementById('groups-total-count').textContent =
    groups.reduce((s, g) => s + g.messages.length, 0) + ' actionable messages';

  listEl.innerHTML = groups.map(g => `
    <div class="group-item${g.id === activeGroupId ? ' active' : ''}" data-gid="${g.id}">
      <div class="group-item-info">
        <div class="group-item-name">${g.name}</div>
        <div class="group-item-meta">${g.members} members</div>
      </div>
      <span class="group-item-count">${g.messages.length}</span>
    </div>`).join('');

  // ── Category badge helper ──────────────────────────────────────────────────
  const categoryClass = { Order:'badge-order', Inquiry:'badge-inquiry', Complaint:'badge-complaint', Payment:'badge-payment', Delivery:'badge-delivery' };

  function badgeHtml(cat) {
    return `<span class="badge ${categoryClass[cat] || ''}">${cat}</span>`;
  }

  // ── Render table ───────────────────────────────────────────────────────────
  function renderTable(messages) {
    if (!messages.length) {
      return `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p>No messages match your search.</p>
      </div>`;
    }
    let html = `<div class="table-wrap"><table class="table"><thead><tr>
      <th>Sender</th><th>Phone</th><th>Message</th><th>Category</th><th>Timestamp</th><th>Action</th>
    </tr></thead><tbody>`;
    messages.forEach(m => {
      const uid = `${activeGroupId}-${m.id}`;
      const isAdded = addedRows.has(uid);
      html += `<tr>
        <td>${m.sender}</td>
        <td>${m.phone}</td>
        <td><div class="table-message-preview" style="max-width:300px;">${m.message}</div></td>
        <td>${badgeHtml(m.category)}</td>
        <td>${m.timestamp}</td>
        <td><button class="action-btn-add${isAdded ? ' added' : ''}" data-uid="${uid}">${isAdded ? 'Added' : 'Add to Sheet'}</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    return html;
  }

  // ── Filtering ──────────────────────────────────────────────────────────────
  function activeMessages() {
    const g = groups.find(g => g.id === activeGroupId);
    return g ? g.messages : [];
  }

  function filteredMessages() {
    const q = document.getElementById('groups-search').value.trim().toLowerCase();
    const msgs = activeMessages();
    if (!q) return msgs;
    return msgs.filter(m =>
      m.sender.toLowerCase().includes(q) ||
      m.message.toLowerCase().includes(q) ||
      m.category.toLowerCase().includes(q) ||
      m.phone.includes(q)
    );
  }

  // ── Pagination render ──────────────────────────────────────────────────────
  function renderPage() {
    const msgs = filteredMessages();
    const total = msgs.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = msgs.slice(start, start + PAGE_SIZE);

    document.getElementById('groups-table-container').innerHTML = renderTable(slice);

    const from = total === 0 ? 0 : start + 1;
    const to   = Math.min(start + PAGE_SIZE, total);
    document.getElementById('pagination-info').textContent = `${from}–${to} of ${total}`;

    document.getElementById('page-prev').disabled = currentPage === 1;
    document.getElementById('page-next').disabled = currentPage === totalPages;

    const pageNums = document.getElementById('page-numbers');
    pageNums.innerHTML = '';
    buildPageRange(currentPage, totalPages).forEach(p => {
      if (p === '…') {
        const el = document.createElement('span');
        el.textContent = '…';
        el.style.cssText = 'padding:0 4px;color:var(--muted);font-size:13px;align-self:center;';
        pageNums.appendChild(el);
      } else {
        const btn = document.createElement('button');
        btn.className = 'page-num' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.addEventListener('click', () => { currentPage = p; renderPage(); });
        pageNums.appendChild(btn);
      }
    });

    updateExportStrip();
  }

  function buildPageRange(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    if (cur <= 4) return [1, 2, 3, 4, 5, '…', total];
    if (cur >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
    return [1, '…', cur-1, cur, cur+1, '…', total];
  }

  // ── Group selection ────────────────────────────────────────────────────────
  function selectGroup(gid) {
    activeGroupId = gid;
    currentPage = 1;
    document.getElementById('groups-search').value = '';

    document.querySelectorAll('.group-item').forEach(el =>
      el.classList.toggle('active', el.dataset.gid === gid));

    const g = groups.find(g => g.id === gid);
    document.getElementById('table-pane-title').textContent = g.name;
    document.getElementById('table-pane-sub').textContent =
      `${g.messages.length} actionable messages · ${g.members} members`;

    renderPage();
  }

  listEl.addEventListener('click', e => {
    const item = e.target.closest('.group-item');
    if (item) selectGroup(item.dataset.gid);
  });

  // ── Add to sheet ───────────────────────────────────────────────────────────
  function updateExportStrip() {
    const strip = document.getElementById('export-strip');
    const count = addedRows.size;
    document.getElementById('added-count').textContent = count;
    strip.style.display = count ? 'flex' : 'none';
  }

  document.getElementById('groups-table-container').addEventListener('click', e => {
    const btn = e.target.closest('.action-btn-add');
    if (!btn || btn.classList.contains('added')) return;
    addedRows.add(btn.dataset.uid);
    btn.textContent = 'Added';
    btn.classList.add('added');
    updateExportStrip();
  });

  document.getElementById('export-sheet-btn').addEventListener('click', () => {
    // Mark all visible messages as added
    filteredMessages().forEach(m => addedRows.add(`${activeGroupId}-${m.id}`));
    renderPage();
  });

  // ── Pagination events ──────────────────────────────────────────────────────
  document.getElementById('page-prev').addEventListener('click', () => { currentPage--; renderPage(); });
  document.getElementById('page-next').addEventListener('click', () => { currentPage++; renderPage(); });
  document.getElementById('groups-search').addEventListener('input', () => { currentPage = 1; renderPage(); });

  // ── Init ───────────────────────────────────────────────────────────────────
  selectGroup(activeGroupId);
</script>
