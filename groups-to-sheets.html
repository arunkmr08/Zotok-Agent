<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    .gts-layout {
      flex-direction: row;
      background: #f8f8f7;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Left Panel ── */
    .gts-panel {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .gts-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 12px;
      flex-shrink: 0;
    }
    .gts-panel-icon {
      background: rgba(15, 157, 88, 0.12);
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .gts-panel-icon img { width: 20px; height: 20px; display: block; }
    .gts-panel-title {
      font-weight: 600;
      font-size: 18px;
      color: #34322d;
      white-space: nowrap;
      letter-spacing: -0.26px;
    }
    .gts-list {
      flex: 1;
      padding: 8px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .gts-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      transition: background 0.15s cubic-bezier(.4,0,.2,1);
    }
    .gts-item-icon { width: 24px; height: 24px; flex-shrink: 0; display: block; }
    .gts-item-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .gts-item:hover { background: #37352f0a; }
    .gts-item.active { background: #37352f0f; }
    .gts-item-name {
      font-weight: 500;
      font-size: 14px;
      color: #34322d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: normal;
      letter-spacing: -0.09px;
    }
    .gts-item-meta {
      font-size: 12px;
      color: #858481;
      line-height: 16px;
    }
    .gts-panel-add {
      margin: 0 12px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px dashed rgba(0,0,0,0.12);
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #858481;
      font-family: inherit;
      letter-spacing: -0.09px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .gts-panel-add:hover { background: #37352f0a; color: #34322d; border-color: rgba(0,0,0,0.2); }

    /* ── Right Content ── */
    .gts-content {
      flex: 1;
      min-width: 0;
      padding: 12px 12px 12px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .gts-card {
      background: white;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 22px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.06);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .gts-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
      padding: 20px 20px 14px;
    }
    .gts-card-title {
      font-weight: 600;
      font-size: 18px;
      color: #34322d;
      line-height: normal;
      letter-spacing: -0.33px;
    }
    .gts-card-sub {
      font-size: 14px;
      color: #858481;
      line-height: 18px;
      margin-top: 3px;
      letter-spacing: -0.09px;
    }
    .gts-card-actions { display: flex; gap: 12px; align-items: center; }
    .gts-btn {
      background: white;
      border: 1px solid #e8e6e0;
      border-radius: 10px;
      padding: 9px 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      color: #34322d;
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: -0.09px;
      transition: background 0.15s cubic-bezier(.4,0,.2,1);
    }
    .gts-btn:hover { background: #f4f3ef; }
    .gts-btn img { height: 18px; width: 18px; display: block; }

    /* ── Table ── */
    .gts-table {
      flex: 1;
      min-height: 0;
      border-top: 1px solid rgba(0,0,0,0.06);
      overflow: auto;
      display: flex;
      flex-direction: column;
    }
    .gts-row {
      display: flex;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .gts-row:last-child { border-bottom: none; }
    .gts-row:not(.gts-row--head) {
      transition: background 0.15s cubic-bezier(.4,0,.2,1);
    }
    .gts-row:not(.gts-row--head):hover { background: #37352f0a; }
    .gts-row--head {
      position: sticky;
      top: 0;
      background: white;
      z-index: 2;
    }
    .gts-row--head .gts-cell {
      font-weight: 500;
      color: #858481;
      padding: 12px 12px;
    }
    .gts-cell {
      font-size: 14px;
      color: #34322d;
      font-weight: 500;
      line-height: 20px;
      display: flex;
      align-items: center;
      padding: 14px 12px;
      letter-spacing: -0.09px;
      overflow: hidden;
    }
    .gts-cell--msg     { flex: 1; min-width: 200px; font-weight: 400; }
    .gts-cell--group   { width: 270px; flex-shrink: 0; }
    .gts-cell--sender  { width: 150px; flex-shrink: 0; }
    .gts-cell--phone   { width: 158px; flex-shrink: 0; font-weight: 400; white-space: nowrap; }
    .gts-cell--time    { width: 190px; flex-shrink: 0; font-weight: 400; white-space: nowrap; }
    .gts-cell--cat     { width: 124px; flex-shrink: 0; }
    .gts-cell--other   { width: 140px; flex-shrink: 0; font-weight: 400; }
    .gts-clip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .gts-group-cell { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .gts-avatar {
      width: 28px;
      height: 28px;
      border-radius: 56px;
      overflow: hidden;
      flex-shrink: 0;
      background: #f0f0ef;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gts-avatar img { width: 28px; height: 28px; display: block; object-fit: cover; }

    /* Badges */
    .gts-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .gts-badge--order     { background: #edf7f0; color: #2f7d4a; }
    .gts-badge--inquiry   { background: #f0f4ff; color: #3a5ccc; }
    .gts-badge--complaint { background: #fff4f0; color: #c04020; }
    .gts-badge--payment   { background: #f5f0ff; color: #6b3fa0; }
    .gts-badge--delivery  { background: #fffbf0; color: #9a7b1c; }

    /* Empty state */
    .gts-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 48px;
    }
    .gts-empty-icon {
      width: 52px;
      height: 52px;
      background: rgba(15,157,88,0.08);
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin-bottom: 4px;
    }
    .gts-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #34322d;
      letter-spacing: -0.18px;
    }
    .gts-empty-sub {
      font-size: 14px;
      color: #858481;
      line-height: 22px;
      letter-spacing: -0.09px;
      max-width: 300px;
    }
    .gts-empty-btn {
      background: #0067ff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.09px;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .gts-empty-btn:hover { background: #0055d4; }

    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position:  600px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #f0f0ef 25%, #f8f8f7 50%, #f0f0ef 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 4px;
    }
  </style>

        { sender:'Farhan Sheikh',   phone:'+91 80000 12345', message:'Need ambient temp delivery for antibiotic batch — not refrigerated.',        category:'Delivery',  timestamp:'Today, 09:00 AM' },
        { sender:'Kavya Rao',       phone:'+91 95678 12345', message:'Expiry date on received batch is only 4 months out. Acceptable margin?',     category:'Complaint', timestamp:'Yesterday, 06:30 PM' },
        { sender:'Sanjay Yadav',    phone:'+91 83456 78901', message:'Stock of Paracetamol 650 running critically low across 3 stores.',           category:'Order',     timestamp:'Yesterday, 04:45 PM' },
        { sender:'Vijay Patil',     phone:'+91 78111 99000', message:'MRP change on labels — need re-sticker for 800 units already in warehouse.', category:'Complaint', timestamp:'Yesterday, 03:00 PM' },
        { sender:'Geeta Patil',     phone:'+91 90011 22033', message:'Drug Inspector visit scheduled next week — need all invoices in order.',     category:'Inquiry',   timestamp:'Yesterday, 01:20 PM' },
        { sender:'Rohit Sharma',    phone:'+91 99001 23456', message:'Temperature log for last cold chain shipment please — for audit.',           category:'Delivery',  timestamp:'Yesterday, 11:00 AM' },
      ]
    },
  ];

  // Flatten all messages with groupName attached
  const ALL_ROWS = [];
  GROUPS.forEach(g => g.messages.forEach(m => ALL_ROWS.push({ ...m, groupName: g.name, groupAvatar: g.avatar })));

  // ── Default columns ────────────────────────────────────────────────────────
  const DEFAULT_COLUMNS = [
    { id: 1, name: 'Group Name' },
    { id: 2, name: 'Sender Name' },
    { id: 3, name: 'Phone Number' },
    { id: 4, name: 'Message' },
    { id: 5, name: 'Timestamp' },
    { id: 6, name: 'Category' },
  ];

  // ── Attendance data (custom sheet) ─────────────────────────────────────────
  const ATTENDANCE_ROWS = [
    { employee_name:'Rahul Kumar',    department:'Sales',      date:'8 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:47 AM', delay:'47', remarks:'Traffic delay' },
    { employee_name:'Priya Sharma',   department:'Finance',    date:'8 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:32 AM', delay:'32', remarks:'Doctor visit' },
    { employee_name:'Amit Verma',     department:'Operations', date:'8 May 2026', scheduled_time:'09:00 AM', arrival_time:'10:15 AM', delay:'75', remarks:'Train delay' },
    { employee_name:'Sunita Patil',   department:'HR',         date:'8 May 2026', scheduled_time:'09:30 AM', arrival_time:'10:05 AM', delay:'35', remarks:'Personal reason' },
    { employee_name:'Deepak Singh',   department:'Warehouse',  date:'8 May 2026', scheduled_time:'08:00 AM', arrival_time:'08:52 AM', delay:'52', remarks:'Bus breakdown' },
    { employee_name:'Kavita Nair',    department:'Sales',      date:'7 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:22 AM', delay:'22', remarks:'Overslept' },
    { employee_name:'Vikram Rao',     department:'Delivery',   date:'7 May 2026', scheduled_time:'07:30 AM', arrival_time:'08:10 AM', delay:'40', remarks:'Road work' },
    { employee_name:'Meena Joshi',    department:'Finance',    date:'7 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:55 AM', delay:'55', remarks:'Child sick' },
    { employee_name:'Sanjay Tiwari',  department:'Operations', date:'7 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:18 AM', delay:'18', remarks:'Minor delay' },
    { employee_name:'Lakshmi Reddy',  department:'Warehouse',  date:'7 May 2026', scheduled_time:'08:00 AM', arrival_time:'09:30 AM', delay:'90', remarks:'Flat tyre' },
    { employee_name:'Arjun Mehta',    department:'Sales',      date:'6 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:45 AM', delay:'45', remarks:'Power outage' },
    { employee_name:'Divya Kapoor',   department:'HR',         date:'6 May 2026', scheduled_time:'09:30 AM', arrival_time:'10:12 AM', delay:'42', remarks:'Traffic jam' },
    { employee_name:'Suresh Pillai',  department:'Delivery',   date:'6 May 2026', scheduled_time:'07:30 AM', arrival_time:'08:05 AM', delay:'35', remarks:'Rain' },
    { employee_name:'Asha Iyer',      department:'Operations', date:'6 May 2026', scheduled_time:'09:00 AM', arrival_time:'09:28 AM', delay:'28', remarks:'Personal' },
    { employee_name:'Kiran Bhat',     department:'Warehouse',  date:'6 May 2026', scheduled_time:'08:00 AM', arrival_time:'09:00 AM', delay:'60', remarks:'Vehicle issue' },
  ];

  // ── Demo sheets ────────────────────────────────────────────────────────────
  const DEMO_SHEETS = [
    {
      id: 'demo1',
      name: 'Group Messages 2026',
      columns: DEFAULT_COLUMNS,
      groupCount: 7,
      groupNames: GROUPS.map(g => g.name),
      subtitle: `${ALL_ROWS.length} rows syncing from all 7 groups`,
    },
    {
      id: 'demo2',
      name: 'Customer Issues',
      columns: [
        { id: 1, name: 'Group Name' },
        { id: 2, name: 'Customer Name' },
        { id: 3, name: 'Phone' },
        { id: 4, name: 'Complaint' },
        { id: 5, name: 'Timestamp' },
      ],
      groupCount: 7,
      groupNames: GROUPS.map(g => g.name),
      rows: ALL_ROWS.filter(r => r.category === 'Complaint'),
    },
    {
      id: 'demo3',
      name: 'Factory Issues',
      columns: [
        { id: 1, name: 'Group Name' },
        { id: 2, name: 'Reported By' },
        { id: 3, name: 'Phone' },
        { id: 4, name: 'Issue' },
        { id: 5, name: 'Issue Type' },
        { id: 6, name: 'Timestamp' },
      ],
      groupCount: 5,
      groupNames: ['Mumbai Distributors Network','Gujarat Wholesalers Group','Bangalore Tech Suppliers','Rajasthan Agri Traders','Hyderabad Pharma Distributors'],
      rows: ALL_ROWS.filter(r => r.category === 'Complaint' || r.category === 'Order'),
    },
    {
      id: 'demo4',
      name: 'Product Price Update',
      columns: [
        { id: 1, name: 'Group Name' },
        { id: 2, name: 'Contact Name' },
        { id: 3, name: 'Phone' },
        { id: 4, name: 'Enquiry Details' },
        { id: 5, name: 'Timestamp' },
      ],
      groupCount: 7,
      groupNames: GROUPS.map(g => g.name),
      rows: ALL_ROWS.filter(r => r.category === 'Inquiry'),
    },
    {
      id: 'demo5',
      name: 'Late Attendance Marks',
      columns: [
        { id: 1, name: 'Employee Name' },
        { id: 2, name: 'Department' },
        { id: 3, name: 'Date' },
        { id: 4, name: 'Scheduled Time' },
        { id: 5, name: 'Arrival Time' },
        { id: 6, name: 'Delay (mins)' },
        { id: 7, name: 'Remarks' },
      ],
      groupCount: 0,
      subtitle: `${ATTENDANCE_ROWS.length} records · HR & Operations`,
      rows: ATTENDANCE_ROWS,
    },
  ];

  // ── Load sheets from localStorage or use demo ──────────────────────────────
  let sheets;
  try {
    const stored = JSON.parse(localStorage.getItem('zotok_sheets_list') || '[]');
    sheets = stored.length ? [...DEMO_SHEETS, ...stored] : DEMO_SHEETS;
  } catch(e) {
    sheets = DEMO_SHEETS;
  }
  let activeSheetId = sheets[0].id;

  // ── Column helpers ─────────────────────────────────────────────────────────
  const BADGE = {
    Order:     'gts-badge--order',
    Inquiry:   'gts-badge--inquiry',
    Complaint: 'gts-badge--complaint',
    Payment:   'gts-badge--payment',
    Delivery:  'gts-badge--delivery',
  };

  function colClass(name) {
    const n = name.toLowerCase();
    if (n.includes('message') || n.includes('msg') || n.includes('text') || n.includes('content') ||
        (n.includes('issue') && !n.includes('type')) || n.includes('complaint') ||
        n.includes('description') || n.includes('enquiry') || n.includes('details') ||
        n.includes('update') || n.includes('remarks'))                                                return 'gts-cell--msg';
    if (n.includes('group'))                                                                           return 'gts-cell--group';
    if (n.includes('sender') || n.includes('reported') || n.includes('customer') ||
        n.includes('employee') || (n.includes('name') && !n.includes('group') && !n.includes('column') && !n.includes('sheet')))
                                                                                                       return 'gts-cell--sender';
    if (n.includes('phone') || n.includes('mobile') || n.includes('contact') || n.includes('number')) return 'gts-cell--phone';
    if (n.includes('time') || n.includes('date') || n.includes('stamp'))                              return 'gts-cell--time';
    if (n.includes('cat') || n.includes('type') || n.includes('label') || n.includes('kind'))         return 'gts-cell--cat';
    return 'gts-cell--other';
  }

  function colValue(name, row) {
    const n = name.toLowerCase();
    // Generic key for custom rows (no groupAvatar = attendance/custom data)
    const genericKey = n.replace(/\s*\(.*?\)\s*/g, '').trim().replace(/\s+/g, '_');
    if (!row.groupAvatar && row[genericKey] !== undefined)
      return `<span class="gts-clip">${row[genericKey]}</span>`;

    // Standard message row mappings
    if (n.includes('group') && row.groupName)
      return `<div class="gts-group-cell"><div class="gts-avatar"><img src="${row.groupAvatar}" alt=""></div><span>${row.groupName}</span></div>`;
    if (n.includes('phone') || n.includes('mobile') || (n.includes('contact') && n.includes('number')))
      return row.phone || '—';
    if (n.includes('message') || n.includes('msg') || n.includes('text') || n.includes('content') ||
        (n.includes('issue') && !n.includes('type')) || n.includes('complaint') ||
        n.includes('description') || n.includes('enquiry') || n.includes('details') || n.includes('update'))
      return row.message ? `<span class="gts-clip">${row.message}</span>` : '—';
    if (n.includes('sender') || n.includes('reported') || n.includes('customer') ||
        (n.includes('name') && !n.includes('group') && !n.includes('column') && !n.includes('sheet')))
      return row.sender ? `<span class="gts-clip">${row.sender}</span>` : '—';
    if (n.includes('time') || n.includes('date') || n.includes('stamp'))
      return row.timestamp || '—';
    if (n.includes('cat') || n.includes('type') || n.includes('label') || n.includes('kind'))
      return row.category ? `<span class="gts-badge ${BADGE[row.category] || ''}">${row.category}</span>` : '—';

    // Generic fallback
    if (row[genericKey] !== undefined) return `<span class="gts-clip">${row[genericKey]}</span>`;
    return '—';
  }

  // ── Render left panel ──────────────────────────────────────────────────────
  function renderList() {
    const listEl = document.getElementById('gts-list');
    listEl.innerHTML = sheets.map(s => `
      <div class="gts-item${s.id === activeSheetId ? ' active' : ''}" data-sid="${s.id}">
        <img class="gts-item-icon" src="assets/icons/26403f92-0912-42ea-b4ea-c6010506c7e8.svg" alt="">
        <div class="gts-item-text">
          <span class="gts-item-name">${s.name}</span>
          <span class="gts-item-meta">${s.groupCount ? `${s.groupCount} group${s.groupCount !== 1 ? 's' : ''}` : 'Custom data'}</span>
        </div>
      </div>`).join('');

    listEl.querySelectorAll('.gts-item').forEach(item => {
      item.addEventListener('click', () => {
        activeSheetId = item.dataset.sid;
        listEl.querySelectorAll('.gts-item').forEach(i =>
          i.classList.toggle('active', i.dataset.sid === activeSheetId));
        renderCard();
      });
    });
  }

  // ── Render right card ──────────────────────────────────────────────────────
  function renderCard() {
    const sheet = sheets.find(s => s.id === activeSheetId);
    const card  = document.getElementById('gts-card');
    if (!sheet) return;

    const cols = sheet.columns && sheet.columns.length ? sheet.columns : DEFAULT_COLUMNS;
    const rows = sheet.rows || ALL_ROWS;

    const subtitle = sheet.subtitle || (() => {
      const names = sheet.groupNames && sheet.groupNames.length ? sheet.groupNames : [];
      const label = !names.length
        ? `${sheet.groupCount} group${sheet.groupCount !== 1 ? 's' : ''}`
        : names.length <= 2 ? names.join(', ')
        : `${names.slice(0, 2).join(', ')} +${names.length - 2} more`;
      return `${rows.length} rows syncing from ${label}`;
    })();

    card.innerHTML = `
      <div class="gts-card-head">
        <div>
          <div class="gts-card-title">${sheet.name}</div>
          <div class="gts-card-sub">${subtitle}</div>
        </div>
        <div class="gts-card-actions">
          <button class="gts-btn">
            <img src="assets/icons/aab464af-9c7c-4387-8eea-790e3bef8a62.svg" alt="">
            Export
          </button>
        </div>
      </div>
      <div class="gts-table">
        <div class="gts-row gts-row--head">
          ${cols.map(c => `<div class="gts-cell ${colClass(c.name)}">${c.name}</div>`).join('')}
        </div>
        ${rows.map(row => `
          <div class="gts-row">
            ${cols.map(c => `<div class="gts-cell ${colClass(c.name)}">${colValue(c.name, row)}</div>`).join('')}
          </div>`).join('')}
      </div>`;
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  renderList();
  renderCard();
</script>
</body>
</html>
