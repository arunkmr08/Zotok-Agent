<style>
  /* Suppress all transitions on initial load to prevent sidebar push animation */
  [data-loading] * { transition: none !important; }
  .leads-layout {
    display: flex;
    height: 100%;
    min-height: 0;
    flex: 1;
  }
  .leads-list-pane {
    width: 280px;
    flex: none;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .leads-list-head {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .leads-list-head h1 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .leads-list-head p {
    font-size: 12px;
    color: var(--muted);
  }
  .leads-list-scroll {
    flex: 1;
    overflow-y: auto;
  }
  .lead-date-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background .12s;
  }
  .lead-date-item:hover { background: var(--white); }
  .lead-date-item.active {
    background: var(--white);
    border-left: 3px solid var(--ink);
    padding-left: 13px;
  }
  .lead-date-item .lead-date-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }
  .lead-date-item .lead-date-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .lead-date-item.active .lead-date-count {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
  .leads-table-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--white);
  }
  .leads-table-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .leads-table-scroll {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  .leads-table-scroll .table-wrap {
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-top: none;
    box-shadow: none;
    overflow: visible; /* scroll must happen on .leads-table-scroll, not here */
  }
  .leads-table-scroll .table {
    width: max-content;
    min-width: 100%;
  }
  .leads-table-scroll .table th,
  .leads-table-scroll .table td {
    white-space: nowrap;
  }
  .leads-table-scroll .table th:first-child,
  .leads-table-scroll .table td:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--white);
  }
  .leads-table-scroll .table th:first-child {
    background: var(--surface);
    z-index: 3;
  }
  .leads-table-scroll .table tbody tr:hover td:first-child {
    background: var(--surface-2);
  }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 48px;
  }
  .empty-state svg { opacity: 0.35; }
  .empty-state p { font-size: 14px; line-height: 1.5; }
  .pagination-bar {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }
  .pagination-info {
    font-size: 13px;
    color: var(--muted);
  }
  .pagination-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .page-num {
    min-width: 32px;
    height: 32px;
    border-radius: var(--r-sm);
    border: 1px solid transparent;
    background: none;
    font-size: 13px;
    color: var(--ink-2);
    cursor: pointer;
    padding: 0 6px;
  }
  .page-num:hover { background: var(--surface); border-color: var(--border); }
  .page-num.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 9px;
    color: var(--muted);
    pointer-events: none;
  }
  .search-input {
    padding-left: 30px;
    width: 200px;
    height: 32px;
    font-size: 13px;
  }
  /* Shimmer */
  @keyframes shimmer {
    from { background-position: -600px 0; }
    to   { background-position:  600px 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--border) 25%, var(--surface-2) 50%, var(--border) 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: var(--r-sm);
  }
  .shimmer-date-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .shimmer-row {
    display: flex;
    gap: 24px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
</style>

    columns.forEach(col => { html += `<th>${col.name}</th>`; });
    html += '</tr></thead><tbody>';
    leads.forEach(lead => {
      html += '<tr>';
      columns.forEach(col => {
        if (col.name === 'Actions: Reply') {
          html += `<td><button class="btn btn-ghost btn-sm">Reply in WhatsApp</button></td>`;
        } else {
          const val = lead[col.name] || '<span style="color:var(--faint)">—</span>';
          html += col.name === 'Last Message'
            ? `<td><div class="table-message-preview" style="max-width:280px;">${val}</div></td>`
            : `<td>${val}</td>`;
        }
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }

  const tableTitle  = document.getElementById('table-pane-title');
  const tableSub    = document.getElementById('table-pane-sub');
  const pageInfo    = document.getElementById('pagination-info');
  const pageNums    = document.getElementById('page-numbers');
  const prevBtn     = document.getElementById('page-prev');
  const nextBtn     = document.getElementById('page-next');
  const searchInput = document.getElementById('leads-search');
  const PAGE_SIZE   = 10;

  let activeleads = [];
  let currentPage = 1;

  function filteredLeads() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) return activeleads;
    return activeleads.filter(lead =>
      Object.values(lead).some(v => String(v).toLowerCase().includes(q))
    );
  }

  function renderPage() {
    const leads = filteredLeads();
    const total = leads.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = leads.slice(start, start + PAGE_SIZE);

    document.getElementById('leads-table-container').innerHTML = renderTable(slice);

    // Info
    const from = total === 0 ? 0 : start + 1;
    const to   = Math.min(start + PAGE_SIZE, total);
    pageInfo.textContent = `${from}–${to} of ${total}`;

    // Prev / Next
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;

    // Page number buttons (show up to 7, with ellipsis logic)
    pageNums.innerHTML = '';
    const range = buildPageRange(currentPage, totalPages);
    range.forEach(p => {
      if (p === '…') {
        const el = document.createElement('span');
        el.textContent = '…';
        el.style.cssText = 'padding:0 4px;color:var(--muted);font-size:13px;align-self:center;';
        pageNums.appendChild(el);
      } else {
        const btn = document.createElement('button');
        btn.className = 'page-num' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.addEventListener('click', () => { currentPage = p; renderPage(); });
        pageNums.appendChild(btn);
      }
    });
  }

  function buildPageRange(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    if (cur <= 4) return [1, 2, 3, 4, 5, '…', total];
    if (cur >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
    return [1, '…', cur-1, cur, cur+1, '…', total];
  }

  function selectDate(dateEl) {
    document.querySelectorAll('.lead-date-item').forEach(el => el.classList.remove('active'));
    dateEl.classList.add('active');
    const group = dateGroups.find(g => g.date === dateEl.dataset.date);
    tableTitle.textContent = dateEl.dataset.date;
    tableSub.textContent = `${group.leads.length} lead${group.leads.length !== 1 ? 's' : ''} detected`;
    activeleads = group.leads;
    currentPage = 1;
    searchInput.value = '';
    renderPage();
  }

  prevBtn.addEventListener('click', () => { currentPage--; renderPage(); });
  nextBtn.addEventListener('click', () => { currentPage++; renderPage(); });
  searchInput.addEventListener('input', () => { currentPage = 1; renderPage(); });

  // Select Today by default
  selectDate(leadsList.querySelector('.lead-date-item'));

  // --- Date item click ---
  leadsList.addEventListener('click', e => {
    const item = e.target.closest('.lead-date-item');
    if (item) selectDate(item);
  });

</script>
</body>
</html>
