<style>
  /* ── Full-height chain ── */
  html, body { height: 100%; overflow: hidden; }
  .app { height: 100vh; overflow: hidden; min-height: unset; }
  /* ── Layout ── */
  .nlv-main {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: #f8f8f7;
    overflow: hidden;
    padding: 0;
  }
  /* ── Top bar ── */
  .nlv-topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 12px;
    flex-shrink: 0;
  }
  .nlv-topbar-icon {
    width: 40px; height: 40px;
    background: rgba(0,221,255,0.18);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nlv-topbar-title {
    font-size: 18px; font-weight: 600; color: #34322d; letter-spacing: -0.26px;
  }
  /* ── Body ── */
  .nlv-body {
    flex: 1; min-height: 0;
    height: 100%;
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
  }
  /* ── Card ── */
  .nlv-card {
    flex: 1; min-height: 0;
    background: white;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 18px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }
  /* ── Card header ── */
  .nlv-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 20px 20px 12px;
  }
  .nlv-head-left { display: flex; flex-direction: column; gap: 3px; }
  .nlv-date-row  { display: flex; align-items: center; gap: 4px; position: relative; }
  .nlv-date-trigger {
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; user-select: none;
    border-radius: 8px; transition: background 0.15s;
    margin: -4px -6px; padding: 4px 6px;
  }
  .nlv-date-trigger:hover { background: #37352f0f; }
  .nlv-date-title {
    font-size: 18px; font-weight: 600; color: #34322d; letter-spacing: -0.33px;
  }
  .nlv-date-chevron { transition: transform 0.18s ease; flex-shrink: 0; }
  .nlv-date-row.open .nlv-date-chevron { transform: rotate(180deg); }
  .nlv-count-sub {
    font-size: 14px; font-weight: 400; color: #858481;
    line-height: 18px; letter-spacing: -0.09px;
  }
  /* Date dropdown */
  .nlv-date-dropdown {
    position: fixed;
    background: white;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    min-width: 220px;
    padding: 6px;
    z-index: 1000;
    display: none;
    flex-direction: column;
    gap: 1px;
  }
  .nlv-date-dropdown.open { display: flex; }
  .nlv-date-opt {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px; font-weight: 500; color: #34322d;
    letter-spacing: -0.09px;
    gap: 12px;
  }
  .nlv-date-opt:hover { background: #37352f0f; }
  .nlv-date-opt.active { background: #37352f0f; }
  .nlv-date-badge {
    background: #f0efeb; color: #858481;
    font-size: 12px; font-weight: 500;
    border-radius: 20px; padding: 2px 8px;
    white-space: nowrap;
  }
  .nlv-date-opt.active .nlv-date-badge { background: #e6e4de; color: #34322d; }
  .nlv-head-right { display: flex; align-items: center; gap: 12px; }
  /* Search */
  .nlv-search {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid #e8e6e0;
    border-radius: 10px; padding: 9px 13px;
    width: 300px;
  }
  .nlv-search-input {
    flex: 1; border: none; outline: none; background: transparent;
    font-size: 14px; color: #34322d; font-family: inherit; letter-spacing: -0.09px;
  }
  .nlv-search-input::placeholder { color: #858481; }
  /* Toolbar buttons */
  .nlv-tool-btn {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid #e8e6e0;
    border-radius: 10px; padding: 9px 13px;
    font-size: 14px; font-weight: 500; color: #34322d;
    letter-spacing: -0.09px; cursor: pointer; white-space: nowrap;
  }
  .nlv-tool-btn:hover { background: #f8f8f7; }
  /* ── Table container ── */
  .nlv-table-wrap {
    flex: 1; min-height: 0;
    border-top: 1px solid rgba(0,0,0,0.06);
    overflow: auto;
  }
  /* ── Table ── */
  .nlv-table {
    width: 100%;
    border-collapse: collapse;
    flex: 1;
  }
  .nlv-table th {
    font-size: 14px; font-weight: 500; color: #858481;
    letter-spacing: -0.09px; text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    white-space: nowrap;
    position: sticky; top: 0;
    background: white;
    z-index: 2;
  }
  .nlv-table td {
    font-size: 14px; color: #34322d;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    line-height: 20px; letter-spacing: -0.09px;
    vertical-align: middle;
  }
  .nlv-table tbody tr:last-child td { border-bottom: none; }
  .nlv-table tbody tr:hover td { background: #fafafa; }
  /* Customer name cell */
  .nlv-name-cell {
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap; font-weight: 500;
  }
  .nlv-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .nlv-avatar img { width: 14px; height: 14px; display: block; }
  /* Mobile — nowrap */
  .nlv-table td.nlv-td-phone { white-space: nowrap; }
  .nlv-table td.nlv-td-location { white-space: nowrap; }
  /* Summary wraps */
  .nlv-table td.nlv-td-summary { min-width: 200px; }
  /* ── Pagination ── */
  .nlv-pagination {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .nlv-page-info { font-size: 13px; color: #858481; }
  .nlv-page-controls { display: flex; align-items: center; gap: 4px; }
  .nlv-page-btn {
    min-width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid transparent; background: none;
    font-size: 13px; color: #34322d; cursor: pointer; padding: 0 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .nlv-page-btn:hover:not(:disabled) { background: #f8f8f7; border-color: #e8e6e0; }
  .nlv-page-btn.active { background: #34322d; color: white; border-color: #34322d; }
  .nlv-page-btn:disabled { opacity: 0.4; cursor: default; }
  /* ── Empty state ── */
  .nlv-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: #858481; padding: 48px;
    font-size: 14px; text-align: center;
  }
  /* ── Shimmer ── */
  @keyframes nlv-shimmer {
    from { background-position: -600px 0; }
    to   { background-position:  600px 0; }
  }
  .nlv-shimmer {
    background: linear-gradient(90deg, #ebe9e4 25%, #f4f2ed 50%, #ebe9e4 75%);
    background-size: 600px 100%;
    animation: nlv-shimmer 1.4s infinite linear;
    border-radius: 4px;
  }
</style>

    { date:'Today', name:'Hariharan Associates',  phone:'+91 89277 09198', location:'Pune, Maharashtra',         summary:'Mujhe 500 kg maida chahiye aur 300 kg sugar. Kal tak pohunchao. Same address hai.' },
    { date:'Today', name:'Nirmal Fabrics',        phone:'+91 92571 49018', location:'Dehradun, Uttarakhand',     summary:'Reorder same as last month — SKU-3310 x 150, SKU-4421 x 80. Urgent shipment required.' },
    { date:'Today', name:'Asha Agro',             phone:'+91 75605 48603', location:'Guwahati, Assam',           summary:'Bhaiya ek baar aur 60 pieces SKU-9910 bhejo. Last wali quality achhi thi. COD rahega.' },
    { date:'Today', name:'Shree Chemicals',       phone:'+91 98399 99824', location:'Ahmedabad, Gujarat',        summary:'Urgent order — 25 bags cement grade packing material SKU-0012. Deliver to plot 44, IDA Nacharam.' },
    { date:'Today', name:'Ganesh Motors',         phone:'+91 88922 62591', location:'Mysuru, Karnataka',         summary:'Hamara monthly standing order process karo — same as PO-7712. Any changes call karo.' },

    // Yesterday — 8
    { date:'Yesterday', name:'Shreeji Logistics',    phone:'+91 99999 11111', location:'Surat, Gujarat',         summary:'Can we partner for last-mile delivery in Gujarat?' },
    { date:'Yesterday', name:'Verma General Store',  phone:'+91 84444 66666', location:'Jaipur, Rajasthan',      summary:'Do you have stock of SKU #4421 right now?' },
    { date:'Yesterday', name:'Rajlakshmi Traders',   phone:'+91 95678 12345', location:'Hyderabad, Telangana',   summary:'Can you deliver to Hyderabad? What are freight costs?' },
    { date:'Yesterday', name:'Modi Retail Chain',    phone:'+91 88001 77002', location:'Mumbai, Maharashtra',    summary:'We run 12 stores. Interested in exclusive deal.' },
    { date:'Yesterday', name:'Chandra Enterprises',  phone:'+91 98001 45678', location:'Lucknow, Uttar Pradesh', summary:'Saw your product demo. Want to set up a call.' },
    { date:'Yesterday', name:'Delta Supplies',       phone:'+91 80000 12345', location:'Chennai, Tamil Nadu',    summary:'Need 300 units urgent for a client order.' },
    { date:'Yesterday', name:'Apex Wholesale',       phone:'+91 92222 33444', location:'Indore, Madhya Pradesh', summary:'Do you have GST invoice facility?' },
    { date:'Yesterday', name:'Sunrise Retailers',    phone:'+91 91234 56789', location:'Nagpur, Maharashtra',    summary:'Can I get a catalogue with current prices?' },

    // 02 May 2026 — 7
    { date:'02 May 2026', name:'Agarwal & Sons',         phone:'+91 99887 76655', location:'Patna, Bihar',           summary:'Please share your best price for 1000 units.' },

    { date:'02 May 2026', name:'Yadav Brothers',          phone:'+91 83456 78901', location:'Varanasi, Uttar Pradesh',summary:'Referred by Ramesh. Looking for quarterly contract.' },

    { date:'02 May 2026', name:'Mehta Bros.',             phone:'+91 90909 12345', location:'Amritsar, Punjab',       summary:"What's your MOQ for wholesale?" },

    // 01 May 2026 — 6
    { date:'01 May 2026', name:'Ratan Hardware',     phone:'+91 77001 88002', location:'Bhopal, Madhya Pradesh', summary:'Need bulk hardware fittings. Minimum 5000 units.' },
    { date:'01 May 2026', name:'Sai Distributors',   phone:'+91 85432 10987', location:'Pune, Maharashtra',      summary:'We cover Pune and surrounding areas. Let\'s talk.' },
    { date:'01 May 2026', name:'Apex Wholesale',     phone:'+91 92222 33444', location:'Indore, Madhya Pradesh', summary:'Do you have GST invoice facility?' },
    { date:'01 May 2026', name:'Nirmala Enterprises',phone:'+91 99234 56780', location:'Nashik, Maharashtra',    summary:'Running a new store in Nashik. Can you supply?' },
    { date:'01 May 2026', name:'Balaji Stores',      phone:'+91 84000 33221', location:'Vijayawada, AP',         summary:'Do you offer consignment model?' },
    { date:'01 May 2026', name:'Triveni Wholesale',  phone:'+91 97777 44444', location:'Jodhpur, Rajasthan',     summary:'My previous supplier raised rates. Looking for better.' },

    // 30 Apr 2026 — 6
    { date:'30 Apr 2026', name:'Prime Retailers',    phone:'+91 86789 01234', location:'Chandigarh, Punjab',     summary:"What's the shelf life of your products?" },
    { date:'30 Apr 2026', name:'Srinivasan & Co.',   phone:'+91 79000 56789', location:'Chennai, Tamil Nadu',    summary:'We are expanding to Tamil Nadu. Need a supplier.' },
    { date:'30 Apr 2026', name:'Balaji Reddy Stores',phone:'+91 84000 33221', location:'Hyderabad, Telangana',   summary:'Do you offer consignment model?' },
    { date:'30 Apr 2026', name:'Triveni Wholesale',  phone:'+91 97777 44444', location:'Jaipur, Rajasthan',      summary:'My previous supplier raised rates. Looking for better.' },
    { date:'30 Apr 2026', name:'Omkar Trading',      phone:'+91 99100 22300', location:'Kolhapur, Maharashtra',  summary:'Need samples before placing bulk order.' },
    { date:'30 Apr 2026', name:'Anand Pharma Dist.', phone:'+91 95000 11223', location:'Ahmedabad, Gujarat',     summary:'We distribute pharma. Can we cross-sell?' },

    // 29 Apr 2026 — 5
    { date:'29 Apr 2026', name:'Anand Pharma Dist.', phone:'+91 95000 11223', location:'Ahmedabad, Gujarat',     summary:'We distribute pharma. Can we cross-sell?' },
    { date:'29 Apr 2026', name:'Omkar Trading',      phone:'+91 99100 22300', location:'Kolhapur, Maharashtra',  summary:'Need samples before placing bulk order.' },
    { date:'29 Apr 2026', name:'Krishna Super Market',phone:'+91 83001 45600', location:'Kolhapur, Maharashtra', summary:'Do you deliver to Kolhapur?' },
    { date:'29 Apr 2026', name:'Supreme Distributors',phone:'+91 91500 67890', location:'Pune, Maharashtra',     summary:'Looking for a long-term supply agreement.' },
    { date:'29 Apr 2026', name:'Kapoor Stores',      phone:'+91 82222 55555', location:'Delhi, Delhi',           summary:'Do you offer credit terms for new buyers?' },
  ];

  // Build date groups
  const dateGroups = [];
  mockLeads.forEach(lead => {
    let g = dateGroups.find(x => x.date === lead.date);
    if (!g) { g = { date: lead.date, leads: [] }; dateGroups.push(g); }
    g.leads.push(lead);
  });

  // State
  let activeLeads = dateGroups[0].leads;
  let currentPage = 1;
  const PAGE_SIZE = 50;

  const searchInput  = document.getElementById('nlv-search');
  const dateTitle    = document.getElementById('nlv-date-title');
  const countSub     = document.getElementById('nlv-count-sub');
  const tableWrap    = document.getElementById('nlv-table-wrap');
  const pageInfo     = document.getElementById('nlv-page-info');
  const pageNums     = document.getElementById('nlv-page-nums');
  const prevBtn      = document.getElementById('nlv-prev');
  const nextBtn      = document.getElementById('nlv-next');

  function avatar(idx) {
    const color = AVATAR_COLORS[idx % AVATAR_COLORS.length];
    return `<div class="nlv-avatar" style="background:${color}"><img src="${AVATAR_ICON}" alt=""></div>`;
  }

  function filtered() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) return activeLeads;
    return activeLeads.filter(l =>
      [l.name, l.phone, l.location, l.summary].some(v => v.toLowerCase().includes(q))
    );
  }

  function renderPage() {
    const leads     = filtered();
    const total     = leads.length;
    const totalPages= Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage     = Math.min(currentPage, totalPages);
    const start     = (currentPage - 1) * PAGE_SIZE;
    const slice     = leads.slice(start, start + PAGE_SIZE);

    let html = `<table class="nlv-table"><thead><tr>
      <th style="width:228px;">Customer Name</th>
      <th style="width:174px;">Mobile Number</th>
      <th style="width:201px;">Location</th>
      <th>Summary</th>
    </tr></thead><tbody>`;

    if (slice.length === 0) {
      html += `<tr><td colspan="4"><div class="nlv-empty">No leads found</div></td></tr>`;
    } else {
      slice.forEach((lead, i) => {
        const globalIdx = start + i;
        html += `<tr>
          <td><div class="nlv-name-cell">${avatar(globalIdx)}<span>${lead.name}</span></div></td>
          <td class="nlv-td-phone">${lead.phone}</td>
          <td class="nlv-td-location">${lead.location}</td>
          <td class="nlv-td-summary">${lead.summary}</td>
        </tr>`;
      });
    }
    html += `</tbody></table>`;
    tableWrap.innerHTML = html;

    // Hide pagination when everything fits on one page
    const paginationEl = document.getElementById('nlv-pagination');
    if (paginationEl) paginationEl.style.display = totalPages <= 1 ? 'none' : 'flex';

    // Pagination info
    const from = total === 0 ? 0 : start + 1;
    const to   = Math.min(start + PAGE_SIZE, total);
    pageInfo.textContent = `${from}–${to} of ${total}`;

    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;

    // Page numbers
    pageNums.innerHTML = '';
    buildPageRange(currentPage, totalPages).forEach(p => {
      if (p === '…') {
        const el = document.createElement('span');
        el.textContent = '…';
        el.style.cssText = 'padding:0 4px;color:#858481;font-size:13px;align-self:center;';
        pageNums.appendChild(el);
      } else {
        const btn = document.createElement('button');
        btn.className = 'nlv-page-btn' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.addEventListener('click', () => { currentPage = p; renderPage(); });
        pageNums.appendChild(btn);
      }
    });
  }

  function buildPageRange(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    if (cur <= 4)           return [1,2,3,4,5,'…',total];
    if (cur >= total - 3)   return [1,'…',total-4,total-3,total-2,total-1,total];
    return [1,'…',cur-1,cur,cur+1,'…',total];
  }

  function selectGroup(group) {
    activeLeads  = group.leads;
    currentPage  = 1;
    searchInput.value = '';
    dateTitle.textContent = group.date;
    countSub.textContent  = `${group.leads.length} New Lead${group.leads.length !== 1 ? 's' : ''}`;
    renderPage();
  }

  prevBtn.addEventListener('click', () => { currentPage--; renderPage(); });
  nextBtn.addEventListener('click', () => { currentPage++; renderPage(); });
  searchInput.addEventListener('input', () => { currentPage = 1; renderPage(); });

  // Date dropdown — portaled to body to escape overflow:hidden on .nlv-card
  const dateRow      = document.getElementById('nlv-date-row');
  const dateTrigger  = document.getElementById('nlv-date-trigger');
  const dateDropdown = document.getElementById('nlv-date-dropdown');
  document.body.appendChild(dateDropdown);
  let ddOpen = false;

  function closeDateDropdown() {
    ddOpen = false;
    dateDropdown.classList.remove('open');
    dateRow.classList.remove('open');
  }

  function renderDateDropdown(activeGroup) {
    dateDropdown.innerHTML = dateGroups.map(g => `
      <div class="nlv-date-opt${g === activeGroup ? ' active' : ''}" data-date="${g.date}">
        <span>${g.date}</span>
        <span class="nlv-date-badge">${g.leads.length} lead${g.leads.length !== 1 ? 's' : ''}</span>
      </div>`).join('');
    dateDropdown.querySelectorAll('.nlv-date-opt').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const group = dateGroups.find(g => g.date === opt.dataset.date);
        if (group) selectGroup(group);
        closeDateDropdown();
      });
    });
  }

  dateTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    if (ddOpen) { closeDateDropdown(); return; }
    renderDateDropdown(dateGroups.find(g => g.date === dateTitle.textContent));
    const rect = dateTrigger.getBoundingClientRect();
    dateDropdown.style.top  = (rect.bottom - 4 + 6) + 'px';
    dateDropdown.style.left = (rect.left + 6) + 'px';
    dateDropdown.classList.add('open');
    dateRow.classList.add('open');
    ddOpen = true;
  });

  document.addEventListener('click', () => { if (ddOpen) closeDateDropdown(); });

  // Init with Today
  selectGroup(dateGroups[0]);
</script>
</body>
</html>
