<!doctype html>

<head>

<title>Profile — Group Sense</title>
<link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body data-page="profile">

<div class="app">
  <div id="sidebar-host"></div>

  <main class="main">


    <div class="page page-narrow">
      <div class="page-head">
        <h1>Profile</h1>
        <p class="lede">Your account and plan.</p>
      </div>

      <div class="profile-head">
        <div class="avatar avatar-lg">RP</div>
        <div class="profile-meta">
          <h2>Ravi Patel</h2>
          <div class="meta-line">
            <span>ravi@patel.co</span>
            <span>·</span>
            <span class="badge"><span class="dot dot-success"></span> Free plan</span>
          </div>
        </div>
      </div>

      <div class="kv-grid" style="margin-bottom:24px">
        <div class="k">Mobile</div>
        <div class="v">+91 98765 43210</div>
        <div class="k">Workspace</div>
        <div class="v">Patel Trading Co.</div>
        <div class="k">Time zone</div>
        <div class="v">Asia/Kolkata · IST</div>
        <div class="k">Member since</div>
        <div class="v">March 2026</div>
      </div>

      <div class="plan-card">
        <div>
          <h3>Upgrade to Pro</h3>
          <p>Unlimited groups, daily digests across all of them, and priority support.</p>
        </div>
        <button class="btn">Upgrade</button>
      </div>
    </div>

</div>
